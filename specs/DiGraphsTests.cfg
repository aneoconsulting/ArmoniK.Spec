\* Empty model; TLC checks the ASSUME statements at startup.
\* SimplePath is defined over the unbounded Seq(G.node) and is not
\* TLC-evaluable; we override it with its MC equivalent (MCSimplePath) so
\* that SimplePath and every operator that depends on it (AreConnectedIn,
\* Ancestor, Descendant, IsStronglyConnected, IsWeaklyConnected,
\* IsUnilateralyConnected) become enumerable on concrete sample graphs.
CONSTANTS
    SimplePath <- MCSimplePath
