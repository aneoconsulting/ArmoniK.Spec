CONSTANTS
    \* Agent identifiers (model values)
    AgentId = {a, b}

    \* Object identifiers (model values)
    ObjectId = {o, p}

    \* Task identifiers (model values)
    TaskId = {t}

    \* NULL is defined as an empty string
    NULL = ""

    \* MaxRetries set to a given integer
    MaxRetries = 1

    \* Override the IsDenumerableSet operator, which is not applicable to finite model verification
    IsDenumerableSet <- IsFiniteSet

    \* Override the TaskAttempts operator with an implementation optimized for model-checking
    \* TP3!TP2!TaskAttempts <- MCTaskAttempts

    \* Override the Graphs operator with ACGraphs operator
    Graphs <- MCGraphs

SPECIFICATION
    Spec

INVARIANTS
    TypeInv

PROPERTIES
    TaskProcessing3Refined
    ObjectProcessing2Refined
    GraphProcessing1Refined

\* SYMMETRY
\*     Symmetry

ACTION_CONSTRAINT
    ActionConstraint
