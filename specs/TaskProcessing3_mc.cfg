CONSTANTS
    \* Agent identifiers (model values)
    AgentId = {a, b}

    \* Task identifiers (model values)
    TaskId = {t, u}

    \* NULL is defined as an empty string
    NULL = ""

    \* MaxRetries set to a given integer
    MaxRetries = 1

    \* Override the IsDenumerableSet operator, which is not applicable to finite model verification
    IsDenumerableSet <- IsFiniteSet

    \* Override the TaskAttempts operator with an implementation optimized for model-checking
    TP2!TaskAttempts <- MCTaskAttempts

SPECIFICATION
    Spec

INVARIANTS
    TypeInv
    TaskStateIntegrity

PROPERTY
    PermanentCancellation
    RequestedCancellationEventualAcknowledgment
    AssignedTaskCancellationResolution
    PausedTaskEventualResume
    PausedTaskEventualResolution
    RefineTaskProcessing2

ACTION_CONSTRAINT
    ActionConstraint
